<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Nina AI</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600&family=Outfit:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-user-select:none;
  user-select:none;
  -webkit-tap-highlight-color: transparent;
}

body{
  height:100vh;
  background:radial-gradient(circle at top, #05070d, #000000);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:18px;
  font-family:'Nunito', sans-serif;
  overflow:hidden;
  color:#e5e7eb;
}

.wrapper{
  width:100%;
  max-width:480px;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:14px;
}

.app{
  width:100%;
  height:78vh;
  margin-top:6px;
  background:rgba(10,12,18,0.92);
  backdrop-filter:blur(14px);
  border-radius:26px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  box-shadow:0 40px 120px rgba(0,0,0,0.95);
  border:1px solid rgba(255,255,255,0.06);
}

.header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:14px;
  font-family:'Outfit', sans-serif;
}

.avatar{
  width:38px;
  height:38px;
  border-radius:50%;
  overflow:hidden;
  border:2px solid rgba(255,255,255,0.2);
  cursor:pointer;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.title{ font-weight:600; font-size:15px; }
.sub{ font-size:12px; opacity:0.5; }

.chat{
  flex:1;
  overflow-y:auto;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.bubble{
  max-width:72%;
  padding:10px 13px;
  border-radius:14px;
  font-size:14px;
  line-height:1.55;
}

.bot{
  align-self:flex-start;
  background:rgba(255,255,255,0.06);
  margin-left:28px;
  position:relative;
}

.user{
  align-self:flex-end;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:#fff;
}

.bot::before{
  content:"";
  width:22px;
  height:22px;
  border-radius:50%;
  background:url("nina.jpg") center/cover;
  position:absolute;
  left:-32px;
  top:6px;
}

.inputBox{
  display:flex;
  padding:14px;
  gap:10px;
  border-top:1px solid rgba(255,255,255,0.06);
  background:rgba(0,0,0,0.45);
  align-items:center;
}

.inputBox input{
  flex:1;
  padding:12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.06);
  color:#e5e7eb;
}

.inputBox button{
  padding:12px 16px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#4f46e5,#7c3aed);
  color:#fff;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#4f46e5,#7c3aed);
  color:#fff;
  font-size:13px;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal img{
  width:95%;
  max-width:420px;
  border-radius:14px;
}
</style>
</head>

<body oncontextmenu="return false">

<div class="wrapper">
<div class="app">

<div class="header">
  <div class="avatar" onclick="openImage()">
    <img src="nina.jpg">
  </div>
  <div>
    <div class="title">Nina AI</div>
    <div class="sub">always here, quietly listening</div>
  </div>
</div>

<div class="chat" id="chat"></div>

<div class="inputBox">
  <input id="nameInput" placeholder="ketik nama kamu..." />
  <button onclick="setName()">lanjut</button>
</div>

</div>

<div class="modal" id="modal" onclick="closeImage()">
  <img src="nina.jpg">
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search)
const API_BASE = params.get("api") || "http://localhost:6969"

const chat = document.getElementById("chat")

let sessionId = "user_" + Math.random().toString(36).substr(2,9)
let name = localStorage.getItem("nina_name")

function openImage(){
  document.getElementById("modal").style.display = "flex"
}
function closeImage(){
  document.getElementById("modal").style.display = "none"
}

function addMessage(text, sender){
  const div = document.createElement("div")
  div.className = "bubble " + sender
  div.innerText = text
  chat.appendChild(div)
  chat.scrollTop = chat.scrollHeight
}

async function sendToServer(message){
  const res = await fetch(`${API_BASE}/chat`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ sessionId, message })
  })
  return await res.json()
}

/* 🔥 AUTO FLOW */
window.onload = async () => {

  if(!name){
    addMessage("hai... siapa namamu?", "bot")
    return
  }

  const res = await sendToServer("start")

  addMessage(`halo ${name} 🤍`, "bot")
  addMessage(res.text, "bot")
}

/* SET NAME */
async function setName(){
  const val = document.getElementById("nameInput").value
  if(!val) return

  name = val
  localStorage.setItem("nina_name", val)

  addMessage(val, "user")

  const res = await sendToServer("start")

  addMessage(`halo ${val} 🤍`, "bot")
  addMessage(res.text, "bot")
}

</script>

</body>
</html>
