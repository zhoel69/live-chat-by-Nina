<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Nina AI</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600&family=Outfit:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color: transparent;}
body{height:100vh;background:radial-gradient(circle at top, #05070d, #000000);display:flex;justify-content:center;align-items:flex-start;padding-top:18px;font-family:'Nunito', sans-serif;overflow:hidden;color:#e5e7eb;}
.wrapper{width:100%;max-width:480px;height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px;}
.app{width:100%;height:78vh;margin-top:6px;background:rgba(10,12,18,0.92);backdrop-filter:blur(14px);border-radius:26px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 40px 120px rgba(0,0,0,0.95);border:1px solid rgba(255,255,255,0.06);}
.header{display:flex;align-items:center;gap:10px;padding:14px;font-family:'Outfit', sans-serif;}
.avatar{width:38px;height:38px;border-radius:50%;overflow:hidden;border:2px solid rgba(255,255,255,0.2);cursor:pointer;}
.avatar img{width:100%;height:100%;object-fit:cover;pointer-events:none;}
.title{ font-weight:600; font-size:15px; }
.sub{ font-size:12px; opacity:0.5; }
.chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
.bubble{max-width:72%;padding:10px 13px;border-radius:14px;font-size:14px;line-height:1.55;word-wrap:break-word;}
.bot{align-self:flex-start;background:rgba(255,255,255,0.06);margin-left:28px;position:relative;}
.user{align-self:flex-end;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;}
.bot::before{content:"";width:22px;height:22px;border-radius:50%;background:url("nina.jpg") center/cover;position:absolute;left:-32px;top:6px;}
.inputBox{display:none;padding:14px;gap:10px;border-top:1px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.45);align-items:center;}
.inputBox input{flex:1;min-width:0;padding:12px;border-radius:14px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.06);color:#e5e7eb;font-size:14px;}
.inputBox button{padding:12px 16px;border:none;border-radius:14px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;}
.choices{padding:14px;display:flex;gap:10px;border-top:1px solid rgba(255,255,255,0.06);}
button{flex:1;padding:12px;border:none;border-radius:16px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;font-size:13px;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.95);display:none;justify-content:center;align-items:center;z-index:999;}
.modal img{width:95%;max-width:420px;border-radius:14px;}
</style>
</head>

<body oncontextmenu="return false">

<div class="wrapper">
<div class="app">

<div class="header">
  <div class="avatar" onclick="openImage()">
    <img src="nina.jpg">
  </div>
  <div>
    <div class="title">Nina AI</div>
    <div class="sub">always here, quietly listening</div>
  </div>
</div>

<div class="chat" id="chat"></div>

<div class="inputBox" id="inputBox">
  <input id="nameInput" placeholder="contoh: Fahmi" />
  <button onclick="saveName()">lanjut</button>
</div>

<div class="choices" id="choices">
  <button onclick="choose(0)">...</button>
  <button onclick="choose(1)">...</button>
</div>

</div>

<div class="footer" style="text-align:center;font-size:11px;opacity:.5;margin-top:10px;">
Crafted with feeling by <b>Zulfahmi Afnula</b><br>
© 2026 — All Rights Reserved
</div>

</div>

<div class="modal" id="modal" onclick="closeImage()">
  <img src="nina.jpg">
</div>

<script>
const chat = document.getElementById("chat")
const buttons = document.querySelectorAll("#choices button")
const inputBox = document.getElementById("inputBox")
const nameInput = document.getElementById("nameInput")
const choicesBox = document.getElementById("choices")

const API_BASE = "http://localhost:6969"

let sessionId = "user_" + Math.random().toString(36).substr(2, 9)
let isTyping = false

/* MODAL */
function openImage(){
  document.getElementById("modal").style.display = "flex"
}
function closeImage(){
  document.getElementById("modal").style.display = "none"
}

/* CHAT */
function addMessage(text, sender){
  const div = document.createElement("div")
  div.className = "bubble " + sender
  div.innerText = text
  chat.appendChild(div)
  chat.scrollTop = chat.scrollHeight
}

/* BUTTON RESET */
function resetButtons(){
  buttons[0].innerText = "..."
  buttons[1].innerText = "..."
}

/* TYPING EFFECT */
function typing(delay=2000){
  return new Promise(res=>{
    const t = document.createElement("div")
    t.innerText = "..."
    t.style.opacity = 0.4
    chat.appendChild(t)
    chat.scrollTop = chat.scrollHeight

    setTimeout(()=>{
      t.remove()
      res()
    },delay)
  })
}

/* API */
async function sendToServer(message){
  const res = await fetch(`${API_BASE}/chat`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ sessionId, message })
  })
  return await res.json()
}

/* RENDER BOT */
async function renderBot(reply){
  isTyping = true
  resetButtons()

  await typing(2000)

  if(reply.text){
    addMessage(reply.text,"bot")
  }

  if(reply.choices){
    buttons[0].innerText = reply.choices[0] || "..."
    buttons[1].innerText = reply.choices[1] || "..."
  }

  isTyping = false
}

/* CHOOSE */
async function choose(i){
  if(isTyping) return

  const txt = buttons[i].innerText
  if(txt === "...") return

  addMessage(txt,"user")
  resetButtons()

  const reply = await sendToServer(txt)

  await renderBot(reply)
}

/* INPUT NAME */
async function saveName(){
  const val = nameInput.value.trim()
  if(!val || isTyping) return

  addMessage(val,"user")

  inputBox.style.display = "none"
  choicesBox.style.display = "flex"
  resetButtons()

  const reply = await sendToServer(val)

  await renderBot(reply)
}

/* ENTER SUPPORT */
nameInput.addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    saveName()
  }
})

/* START (DELAY 7 DETIK) */
window.onload = async () => {
  choicesBox.style.display = "flex"
  resetButtons()

  setTimeout(async () => {
    const reply = await sendToServer("start")

    await renderBot(reply)

    if(reply.askName){
      choicesBox.style.display = "none"
      inputBox.style.display = "flex"
    }
  },7000)
}
</script>

</body>
</html>
